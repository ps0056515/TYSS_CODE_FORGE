name: Deploy CodeForge to AWS VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy CodeForge to AWS VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.CODEFORGE_AWS_HOST }}
          username: ${{ secrets.CODEFORGE_SSH_USER || 'ubuntu' }}
          key: ${{ secrets.CODEFORGE_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            DEPLOY_PATH="/home/ubuntu/TYSS_CODE_FORGE"

            echo "Deploying to $DEPLOY_PATH"

            cd "$DEPLOY_PATH"

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Load NVM (if used)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # Install dependencies
            npm install

            # Build (if applicable)
            npm run build || echo "No build step"

            # Restart systemd service
            systemctl restart nodeapp

            # Verify service
            systemctl status nodeapp --no-pager

            echo "Deployment completed successfully"
